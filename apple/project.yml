name: YuBing
options:
  bundleIdPrefix: top.lordly
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
    watchOS: "10.0"
  xcodeVersion: "26.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
packages:
  FFmpegLibav:
    url: https://github.com/tylerjonesio/ffmpeg-libav-spm.git
    revision: 70acff8279dc8a8e87cce5eb53fc52104aa47703
targets:
  YuBing:
    type: application
    platform: iOS
    sources:
      - path: Shared
    dependencies:
      - target: YuBingWatch
        embed: true
      - package: FFmpegLibav
        product: FFmpeg
    entitlements:
      path: Config/YuBing.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: top.lordly.yubing
        PRODUCT_NAME: YuBing
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: "\u9c7c\u997c"
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: false
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_CFBundleIconName: AppIcon
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UIBackgroundModes: audio
        INFOPLIST_KEY_UIFileSharingEnabled: true
        INFOPLIST_KEY_LSSupportsOpeningDocumentsInPlace: true
        INFOPLIST_KEY_NSAppleMusicUsageDescription: "用于扫描并导入你已下载到设备的本地音乐。"
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: "用于在同一 Wi-Fi 下从电脑向鱼饼快速传入文件。"
        INFOPLIST_KEY_NSBonjourServices:
          - _yubing._tcp
        INFOPLIST_KEY_CFBundleDocumentTypes:
          - CFBundleTypeName: YuBing Files
            CFBundleTypeRole: Editor
            LSHandlerRank: Owner
            LSItemContentTypes:
              - public.data
              - public.content
              - public.audiovisual-content
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: false
        SWIFT_OBJC_BRIDGING_HEADER: Shared/AudioCodecBridge/YuBingAudioCodec.h
        PROVISIONING_PROFILE_SPECIFIER: $(IOS_PROFILE_NAME)
  YuBingMac:
    type: application
    platform: macOS
    sources:
      - path: Shared
    dependencies:
      - package: FFmpegLibav
        product: FFmpeg
    entitlements:
      path: Config/YuBingMac.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: top.lordly.yubing
        PRODUCT_NAME: YuBing
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: "\u9c7c\u997c"
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: false
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        ENABLE_HARDENED_RUNTIME: true
        SWIFT_OBJC_BRIDGING_HEADER: Shared/AudioCodecBridge/YuBingAudioCodec.h
  YuBingWatch:
    type: application
    platform: watchOS
    sources:
      - path: Watch
      - path: Shared/Models/AudioLyrics.swift
    entitlements:
      path: Config/YuBingWatch.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: top.lordly.yubing.watchkitapp
        PRODUCT_NAME: YuBing Watch
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: "\u9c7c\u997c"
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: false
        INFOPLIST_KEY_CFBundleIconName: AppIcon
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_WKApplication: true
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: top.lordly.yubing
        INFOPLIST_KEY_WKRunsIndependentlyOfCompanionApp: true
        INFOPLIST_KEY_UIBackgroundModes: audio
        TARGETED_DEVICE_FAMILY: "4"
        PROVISIONING_PROFILE_SPECIFIER: $(WATCH_PROFILE_NAME)
